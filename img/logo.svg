<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="Mente Sana">

  <!-- Logomark: rounded square background -->
  <rect width="56" height="56" rx="14" fill="#4A7FA5"/>

  <!-- Icon: brain/lotus mark in white -->
  <!-- Left hemisphere arc -->
  <path d="M28 44C19 44 14 38.5 14 31C14 23.5 19 17.5 28 17.5"
        stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Right hemisphere arc -->
  <path d="M28 44C37 44 42 38.5 42 31C42 23.5 37 17.5 28 17.5"
        stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Center dashed divider (corpus callosum) -->
  <line x1="28" y1="17.5" x2="28" y2="44"
        stroke="white" stroke-width="1.6" stroke-dasharray="2.5 4" stroke-linecap="round"/>
  <!-- Leaf flourish at top (growth) -->
  <path d="M23 17.5C24.2 13 31.8 13 33 17.5"
        stroke="white" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Wordmark: "Mente Sana" -->
  <text x="70" y="24"
        font-family="'Playfair Display', Georgia, serif"
        font-size="18" font-weight="700"
        fill="#1E2D3D" letter-spacing="-0.3">Mente</text>
  <text x="70" y="44"
        font-family="'Playfair Display', Georgia, serif"
        font-size="18" font-weight="400" font-style="italic"
        fill="#4A7FA5" letter-spacing="-0.2">Sana</text>

  <!-- Tagline dot -->
  <circle cx="155" cy="10" r="3.5" fill="#4A7FA5" opacity="0.6"/>

</svg>
